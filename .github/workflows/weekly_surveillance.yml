name: Weekly Surveillance Report

on:
  schedule:
    - cron: '0 6 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --quiet \
            "duckdb>=1.1.0" "pandas==2.2.2" "pyarrow==16.0.0" \
            "httpx==0.27.0" "dbt-core==1.8.0" "dbt-duckdb==1.8.0" "numpy<2.0"
      - name: Ingest CDC NHSN data
        run: python scripts/ingest_nhsn.py
      - name: Run dbt
        run: |
          cd dbt
          dbt run --profiles-dir . --no-version-check
          dbt test --profiles-dir . --no-version-check
      - name: Detect anomalies
        run: python scripts/detect_anomalies_stat.py
      - name: Generate report
        run: python scripts/generate_report.py
      - name: Commit and push
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git add reports/ data/epi.duckdb
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "chore: weekly surveillance report $(date +%Y-%m-%d)"
            git push origin main
          fi
